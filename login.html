<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar bg-dark p-3 text-white d-flex justify-content-between">
    <h4>Login</h4>
</nav>

<div class="container mt-4">
    <form id="loginForm" class="w-50 mx-auto">
        <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email" required>
        <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password" required>
        <button type="submit" class="btn btn-success w-100">Login</button>
    </form>

    <p id="loginMsg" class="text-center mt-3"></p>
</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault(); // Prevent form submission to handle login manually

        // Get user input for email and password
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;

        // Simulate basic login validation (replace this with your own login check, such as an API request)
        if (email === "shivani@gmail.com" && password === "1234") {
            // Redirect to catalog page on successful login
            window.location.href = "catalogpage.html";
        } else {
            // Display an error message if login fails
            document.getElementById("loginMsg").textContent = "Invalid credentials. Please try again.";
            document.getElementById("loginMsg").style.color = "red";
        }
    });
</script>

</body>
</html>
