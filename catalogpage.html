<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar bg-dark p-3 text-white d-flex justify-content-between">
    <h4>ShopEasy</h4>
    <a href="cart.html" class="btn btn-warning">Cart 🛒</a>
</nav>

<div class="container mt-4">
    <div class="product-grid">
        <div class="card p-3">
            <h5>Shirt</h5>
            <img src="shirt.jpg"style="width: 150px; height: auto;" >
            <p>₹500</p>
            <button class="btn btn-primary" onclick="addToCart('Shirt', 500)">Add</button>
        </div>

        <div class="card p-3">
            <h5>Shoes</h5>
             <img src="shoes.png"style="width: 150px; height: auto;" >
            <p>₹1200</p>
            <button class="btn btn-primary" onclick="addToCart('Shoes', 1200)">Add</button>
        </div>

        <div class="card p-3">
            <h5>Watch</h5>
             <img src="watch.png"style="width: 150px; height: auto;" >
            <p>₹2000</p>
            <button class="btn btn-primary" onclick="addToCart('Watch', 2000)">Add</button>
        </div>
    </div>
</div>

<script src="js/script.js"></script>
<script>
    // Function to add items to the cart
    function addToCart(name, price) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart.push({ name: name, price: price });
        localStorage.setItem("cart", JSON.stringify(cart));
    }
</script>

</body>
</html>
