<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center">Register</h2>

    <form id="registerForm" class="w-50 mx-auto">
        <input id="email" type="email" class="form-control mb-2" placeholder="Email" required>
        <input id="password" type="password" class="form-control mb-2" placeholder="Password" required>

        <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>

    <p id="msg" class="text-center mt-3"></p>

    <p class="text-center mt-3">
        Already have an account?
        <a href="login.html">Login</a>
    </p>
</div>

<script>
    document.getElementById("registerForm").addEventListener("submit", function(e) {
        e.preventDefault(); // Prevent form submission
        // Add your registration logic here (e.g., save data to server or local storage)

        // Redirect to login page after registration
        window.location.href = "login.html"; 
    });
</script>

</body>
</html>
